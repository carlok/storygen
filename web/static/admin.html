<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Story Video Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* ── admin-specific overrides ── */
    #container { max-width: 1000px; }

    .stats-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .stat-card {
      flex: 1;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      backdrop-filter: blur(12px);
      text-align: center;
    }
    .stat-card .stat-val {
      font-size: 1.8rem;
      font-weight: 700;
      color: #a5b4fc;
      letter-spacing: -0.04em;
    }
    .stat-card .stat-lbl {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 0.2rem;
    }

    .user-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      overflow-x: auto;
    }
    .section-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.9rem;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th {
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0 0.6rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 0.65rem 0.6rem; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface-hover); }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      vertical-align: middle;
      margin-right: 0.5rem;
      background: rgba(99,102,241,0.2);
    }
    .avatar-placeholder {
      display: inline-flex;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(99,102,241,0.25);
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #a5b4fc;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      letter-spacing: 0.03em;
    }
    .badge-admin   { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.35); }
    .badge-active  { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .badge-disabled { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }

    .action-cell { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .btn-sm {
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.25rem 0.65rem;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-sm:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-sm:active { transform: translateY(0); }
    .btn-disable  { background: rgba(248,113,113,0.15); color: #f87171; border-color: rgba(248,113,113,0.3); }
    .btn-enable   { background: rgba(16,185,129,0.15); color: #34d399; border-color: rgba(16,185,129,0.3); }
    .btn-mkadmin  { background: rgba(99,102,241,0.15); color: #a5b4fc; border-color: rgba(99,102,241,0.3); }
    .btn-rmadmin  { background: rgba(255,255,255,0.06); color: var(--text-muted); border-color: var(--border); }
    .btn-delete   { background: rgba(248,113,113,0.08); color: #f87171; border-color: rgba(248,113,113,0.2); }

    #empty-msg { text-align: center; color: var(--text-muted); padding: 2rem 0; font-size: 0.85rem; }
  </style>
</head>

<body>
  <h1>Admin Panel</h1>
  <div id="container">

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-val" id="stat-users">—</div>
        <div class="stat-lbl">Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-jobs">—</div>
        <div class="stat-lbl">Videos generated</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-disk">—</div>
        <div class="stat-lbl">Disk used</div>
      </div>
    </div>

    <!-- User table -->
    <div class="user-table-wrap">
      <div class="section-title">Users</div>
      <table id="user-table">
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Joined</th>
            <th>Jobs</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-tbody">
          <tr><td colspan="6" id="empty-msg">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <footer>&copy; 2026 <a href="https://carlo.perassi.com">carlok</a> &amp; <a href="https://claude.ai">Claude</a></footer>

  <div id="modal" hidden>
    <div class="modal-box">
      <div class="modal-spinner"></div>
      <p id="modal-msg"></p>
    </div>
  </div>

  <script>
    const modalEl  = document.getElementById('modal');
    const modalMsg = document.getElementById('modal-msg');
    function showModal(msg) { modalMsg.textContent = msg; modalEl.hidden = false; }
    function hideModal()    { modalEl.hidden = true; }

    function fmtBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024 ** 2) return (b / 1024).toFixed(1) + ' KB';
      if (b < 1024 ** 3) return (b / 1024 ** 2).toFixed(1) + ' MB';
      return (b / 1024 ** 3).toFixed(2) + ' GB';
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function avatarEl(u) {
      if (u.avatar_url) return `<img class="avatar" src="${u.avatar_url}" alt="" />`;
      const initials = (u.display_name || u.email || '?')[0].toUpperCase();
      return `<span class="avatar-placeholder">${initials}</span>`;
    }

    function renderRow(u) {
      const statusBadge = u.is_active
        ? `<span class="badge badge-active">Active</span>`
        : `<span class="badge badge-disabled">Disabled</span>`;
      const adminBadge = u.is_admin
        ? `&nbsp;<span class="badge badge-admin">Admin</span>`
        : '';

      const toggleBtn = u.is_active
        ? `<button class="btn-sm btn-disable" onclick="patchUser('${u.id}', {is_active:false})">Disable</button>`
        : `<button class="btn-sm btn-enable"  onclick="patchUser('${u.id}', {is_active:true})">Enable</button>`;

      const adminBtn = u.is_admin
        ? `<button class="btn-sm btn-rmadmin" onclick="patchUser('${u.id}', {is_admin:false})">Revoke admin</button>`
        : `<button class="btn-sm btn-mkadmin" onclick="patchUser('${u.id}', {is_admin:true})">Make admin</button>`;

      return `
        <tr data-id="${u.id}">
          <td>${avatarEl(u)}<strong>${u.display_name || '—'}</strong></td>
          <td>${u.email}</td>
          <td>${fmtDate(u.created_at)}</td>
          <td>${u.job_count}</td>
          <td>${statusBadge}${adminBadge}</td>
          <td>
            <div class="action-cell">
              ${toggleBtn}
              ${adminBtn}
              <button class="btn-sm btn-delete" onclick="deleteUser('${u.id}', '${u.email}')">Delete</button>
            </div>
          </td>
        </tr>`;
    }

    async function loadStats() {
      const res  = await fetch('/api/admin/stats');
      if (!res.ok) return;
      const data = await res.json();
      document.getElementById('stat-users').textContent = data.total_users;
      document.getElementById('stat-jobs').textContent  = data.total_jobs;
      document.getElementById('stat-disk').textContent  = fmtBytes(data.disk_bytes);
    }

    let users = [];

    async function loadUsers() {
      const res  = await fetch('/api/admin/users?limit=200');
      if (!res.ok) { document.getElementById('empty-msg').textContent = 'Access denied.'; return; }
      users = await res.json();
      const tbody = document.getElementById('user-tbody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" id="empty-msg">No users yet.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(renderRow).join('');
    }

    async function patchUser(id, patch) {
      showModal('Updating…');
      try {
        const res = await fetch(`/api/admin/users/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patch),
        });
        if (!res.ok) { const e = await res.json(); alert(e.detail || 'Error'); return; }
        await Promise.all([loadUsers(), loadStats()]);
      } finally { hideModal(); }
    }

    async function deleteUser(id, email) {
      if (!confirm(`Permanently delete ${email} and all their data? This cannot be undone.`)) return;
      showModal('Deleting…');
      try {
        const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
        if (!res.ok) { const e = await res.json(); alert(e.detail || 'Error'); return; }
        await Promise.all([loadUsers(), loadStats()]);
      } finally { hideModal(); }
    }

    // Guard: ensure current user is admin
    (async () => {
      const me = await fetch('/api/me').catch(() => null);
      if (!me || !me.ok) { location.href = '/'; return; }
      const data = await me.json();
      if (!data.is_admin) { location.href = '/'; return; }

      await Promise.all([loadStats(), loadUsers()]);
    })();
  </script>
</body>

</html>
