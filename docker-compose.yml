services:
  app:
    build: .
    profiles: [cli]
    volumes:
      - ./src:/app
      - ./assets:/assets
      - ./output:/output

  web:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./web:/app
      - ./src:/src
      - ./assets:/assets
      - ./output:/output
      - storygen_storage:/storage
    # depends_on: db  ← uncomment when running with --profile multi-user

  db:
    image: postgres:16-alpine
    profiles: [multi-user]
    environment:
      POSTGRES_DB: storygen
      POSTGRES_USER: storygen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storygen}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storygen"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  storygen_storage:
