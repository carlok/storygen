services:

  # ── CLI: run generate.py directly without the web UI ─────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-base
    profiles: [cli]
    volumes:
      - ./src:/app
      - ./assets:/assets
      - ./output:/output

  # ── Web: FastAPI backend (personal + multi-user) ──────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-base
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./web:/app
      - ./src:/src
      - ./assets:/assets
      - ./output:/output
      - storygen_storage:/storage
    # depends_on: db  ← uncomment when running with --profile multi-user

  # ── Frontend dev server (Vite HMR, proxies /api and /auth to web) ─────────────
  #   podman compose --profile dev up frontend-dev
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: frontend-dev
    profiles: [dev]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app        # live source code → hot reload
      - /app/node_modules      # anonymous: keep container's node_modules intact

  # ── Build frontend once (output lands in web/static via vite outDir) ──────────
  #   podman compose --profile build run --rm frontend-build
  frontend-build:
    image: node:20-alpine
    profiles: [build]
    command: >
      sh -c "
        cd /workspace/frontend &&
        npm ci &&
        npm run build
      "
    volumes:
      - .:/workspace           # workspace root so ../web/static resolves correctly

  # ── DB migrations (run once after first 'up', or after schema changes) ────────
  #   podman compose --profile multi-user run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-base
    profiles: [multi-user]
    command: alembic upgrade head
    env_file: .env
    volumes:
      - .:/workspace           # workspace root where alembic.ini lives
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy

  # ── Production DB (multi-user mode) ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    profiles: [multi-user]
    environment:
      POSTGRES_DB: storygen
      POSTGRES_USER: storygen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storygen}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storygen"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Test DB (ephemeral — no named volume, dropped after test run) ─────────────
  db-test:
    image: postgres:16-alpine
    profiles: [test]
    environment:
      POSTGRES_DB: storygen_test
      POSTGRES_USER: storygen
      POSTGRES_PASSWORD: storygen_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storygen"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend tests (pytest + coverage, multi-user mode against db-test) ─────────
  backend-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-test
    profiles: [test]
    environment:
      DATABASE_URL: postgresql+asyncpg://storygen:storygen_test@db-test/storygen_test
      SECRET_KEY: test-secret-key-32chars-abcde-xyz0!
      ADMIN_EMAIL: ""
      RESEND_API_KEY: ""
      RESEND_FROM: ""
    volumes:
      - .:/workspace           # workspace root (pytest discovers tests/ and web/)
      - ./web:/app
      - ./src:/src
      - ./assets:/assets
      - ./output:/output
    working_dir: /workspace
    depends_on:
      db-test:
        condition: service_healthy

  # ── Frontend tests (vitest + coverage, source baked into image) ───────────────
  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: frontend-test
    profiles: [test]

volumes:
  pgdata:
  storygen_storage:
